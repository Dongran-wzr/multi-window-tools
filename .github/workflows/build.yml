name: Build & Release

permissions:
  contents: write   # 允许创建 Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────
  # 三平台并行构建
  # ──────────────────────────────────────
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            platform: windows-2022

          - name: macOS (Apple Silicon)
            platform: macos-latest

          - name: Linux
            platform: ubuntu-22.04

    runs-on: ${{ matrix.platform }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Linux 系统依赖
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用
        run: npm run tauri build

      - name: 上传构建产物 (Workflow Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/**/*
          retention-days: 7

  # ──────────────────────────────────────
  # 仅在推送 tag 时创建 GitHub Release
  # ──────────────────────────────────────
  release:
    name: 创建 Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: ${{ github.ref_name }}
          body: |
            ## 📥 下载

            | 平台 | 安装包 |
            |------|--------|
            | Windows | `.msi` / `.exe` |
            | macOS | `.dmg` |
            | Linux | `.deb` / `.AppImage` |

            > 详见下方 Assets 列表，选择对应系统的文件下载安装。

            ---
            💡 提交反馈请到 [Issues](https://github.com/${{ github.repository }}/issues)。
          files: |
            **/*.msi
            **/*.exe
            **/*.dmg
            **/*.deb
            **/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
