<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c8cff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <rect x="80" y="120" width="352" height="240" rx="20" fill="#1a1d23" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>
  <!-- Title bar dots -->
  <circle cx="110" cy="150" r="10" fill="#f87171"/>
  <circle cx="140" cy="150" r="10" fill="#facc15"/>
  <circle cx="170" cy="150" r="10" fill="#4ade80"/>
  <!-- Terminal prompt -->
  <text x="110" y="210" font-family="monospace" font-size="24" fill="#6c8cff">$</text>
  <text x="140" y="210" font-family="monospace" font-size="24" fill="#e4e6eb"> ./start</text>
  <!-- Grid lines -->
  <line x1="256" y1="120" x2="256" y2="360" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
  <line x1="80" y1="240" x2="432" y2="240" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
  <!-- Bottom tabs -->
  <rect x="80" y="380" width="140" height="40" rx="10" fill="rgba(255,255,255,0.1)"/>
  <rect x="230" y="380" width="140" height="40" rx="10" fill="rgba(255,255,255,0.05)"/>
</svg>
